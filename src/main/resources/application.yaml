spring:
  application:
    name: shop-app

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  upload:
    product-images: uploads/products

server:
  port: 8080